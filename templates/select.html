<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Select Columns — AI Bias Detector</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --deep: #060914;
    --accent: #6c63ff;
    --teal: #2dd4bf;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --glass: rgba(255, 255, 255, 0.03);
    --glass-border: rgba(255, 255, 255, 0.08);
  }

  html, body {
    height: 100%; background: var(--deep); color: var(--text);
    font-family: 'DM Sans', sans-serif; overflow-x: hidden;
  }

  /* Backgrounds */
  #stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .orb { position: fixed; border-radius: 50%; filter: blur(80px); opacity: 0.12; pointer-events: none; z-index: 0; }
  .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; }
  .orb-2 { width: 400px; height: 400px; background: var(--teal); bottom: -80px; right: -80px; }

  /* Layout */
  .page-container {
    position: relative; z-index: 10; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem;
  }

  .glass-card {
    background: var(--glass); border: 1px solid var(--glass-border);
    backdrop-filter: blur(16px); border-radius: 20px;
    padding: 3rem; max-width: 700px; width: 100%;
    animation: fadeSlide 0.6s ease both;
  }

  .center { text-align: center; }
  .title { font-family: 'Syne', sans-serif; font-size: 2.2rem; font-weight: 700; margin-bottom: 0.5rem; color: #fff; }
  .subtitle { color: var(--muted); margin-bottom: 2.5rem; font-size: 1rem; }

  .step-label {
    font-size: 0.85rem; text-transform: uppercase; letter-spacing: 0.1em;
    color: var(--teal); margin-bottom: 1.5rem; text-align: center; font-weight: 700;
  }

  /* Checkboxes */
  .col-select-group { margin-bottom: 2rem; }
  
  .checkbox-grid { 
    display: grid; 
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); 
    gap: 12px; 
  }
  
  .checkbox-card {
    background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 12px;
    padding: 14px 16px; display: flex; align-items: center; gap: 10px; cursor: pointer;
    font-size: 0.95rem; transition: all 0.2s; color: var(--text);
  }
  
  .checkbox-card:hover { 
    border-color: var(--accent); 
    background: rgba(108,99,255,0.05); 
    transform: translateY(-2px);
  }
  
  .checkbox-card input { 
    accent-color: var(--accent); 
    width: 18px; 
    height: 18px; 
    cursor: pointer; 
  }

  /* Buttons */
  .btn-primary {
    display: block; width: 100%; padding: 1.1rem; text-align: center;
    background: linear-gradient(135deg, var(--accent) 0%, var(--teal) 100%);
    color: #fff; font-family: 'Syne', sans-serif; font-weight: 700; font-size: 1.05rem;
    border: none; border-radius: 12px; cursor: pointer;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }
  
  .btn-primary:hover { 
    transform: translateY(-2px); 
    box-shadow: 0 0 20px rgba(108, 99, 255, 0.4); 
  }

  .back-link { 
    display: inline-block; margin-top: 1.5rem; color: var(--muted); 
    text-decoration: none; font-size: 0.9rem; transition: color 0.2s; 
  }
  
  .back-link:hover { color: #fff; }

  @keyframes fadeSlide { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<canvas id="stars"></canvas>

<div class="page-container">
  <div class="glass-card">
    <div class="center">
      <h1 class="title">Configure Analysis</h1>
      <p class="subtitle">Choose the attributes you want to check for hidden bias</p>
    </div>

    <div class="step-label">DATASET COLUMNS</div>
    
    <form method="POST">
      <div class="col-select-group">
        <div class="checkbox-grid">
          {% for col in columns %}
          <label class="checkbox-card">
            <input type="checkbox" name="columns" value="{{ col }}">
            <span>{{ col }}</span>
          </label>
          {% endfor %}
        </div>
      </div>

      <button type="submit" class="btn-primary">Detect Bias →</button>
    </form>

    <div class="center">
      <a href="/" class="back-link">← Cancel and return</a>
    </div>
  </div>
</div>

<script>
  // Starfield Animation
  const canvas = document.getElementById('stars');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  function initStars(n = 100) {
    stars = Array.from({length: n}, () => ({
      x: Math.random() * canvas.width, y: Math.random() * canvas.height,
      r: Math.random() * 1.2 + 0.2, alpha: Math.random() * 0.7 + 0.1,
      speed: Math.random() * 0.3 + 0.05, twinkleSpeed: Math.random() * 0.02 + 0.005,
      twinkleDir: Math.random() > 0.5 ? 1 : -1
    }));
  }
  function drawStars() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    stars.forEach(s => {
      s.alpha += s.twinkleSpeed * s.twinkleDir;
      if (s.alpha > 0.9 || s.alpha < 0.05) s.twinkleDir *= -1;
      s.y -= s.speed;
      if (s.y < 0) { s.y = canvas.height; s.x = Math.random() * canvas.width; }
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180,200,255,${s.alpha})`; ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }
  resize(); initStars(); drawStars();
  window.addEventListener('resize', () => { resize(); initStars(); });
</script>
</body>
</html>
